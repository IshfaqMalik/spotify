resources:
  jobs:
    spotify_pipeline:
      name: spotify_pipeline
      tasks:
        - task_key: wheel_run
          python_wheel_task:
            package_name: spotify
            entry_point: main
          libraries:
            - whl: ../dist/*.whl
           
          job_cluster_key: ds3_v3_std
        - task_key: bronze
          depends_on:
            - task_key: wheel_run
          notebook_task:
            notebook_path: ../spotify_pipeline/notebooks/bronze/01_bronze_ingestion.ipynb
            base_parameters:
              pipeline_id: "{{job.id}}"
              task_id: "{{task.run_id}}"
              run_id: "{{job.run_id}}"
              processed_time: "{{job.trigger.time.iso_datetime}}"
              catalog: ${var.catalog}
            source: WORKSPACE
          job_cluster_key: ds3_v3_std
        - task_key: silver
          depends_on:
            - task_key: bronze
          notebook_task:
            notebook_path: ../spotify_pipeline/notebooks/silver/02_silver_trans.ipynb
            base_parameters:
              catalog: ${var.catalog}
            source: WORKSPACE
          job_cluster_key: ds3_v3_std
        - task_key: gold
          depends_on:
            - task_key: silver
          notebook_task:
            notebook_path: ../spotify_pipeline/notebooks/gold/001_gold_streaming.ipynb
            base_parameters:
              catalog: ${var.catalog}
            source: WORKSPACE
          job_cluster_key: ds3_v3_std
      job_clusters:
        - job_cluster_key: ds3_v3_std
          new_cluster: ${var.ds3_v3_std}