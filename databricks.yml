# This is a Databricks asset bundle definition for spotify.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: spotify
  uuid: 4ce309c3-3ff8-4546-97d3-57fe1b6b4efb

include:
  - resources/*.yml
  - resources/*/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    default: dev
  dev_flag:
    default: True


targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://adb-7405612200933438.18.azuredatabricks.net
    variables:
      catalog: dev
      dev_flag: True
      
    presets:
      artifacts_dynamic_version: true
  test:
    mode: production
    workspace:
      host: https://adb-7405607648433478.18.azuredatabricks.net
      # We explicitly deploy to /Workspace/Users/ishfaqmmalik@outlook.com to make sure we only have a single copy.
      root_path: /Workspace/Shared/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: test
      dev_flag: false
    permissions:
      - service_principal_name: 06dc8a1f-5666-4cdd-adb0-f08ed6f9ac1a
        level: CAN_MANAGE
    run_as:
       service_principal_name: 06dc8a1f-5666-4cdd-adb0-f08ed6f9ac1a
  prod:
    mode: production
    workspace:
      host: https://adb-7405609543179080.0.azuredatabricks.net
      # We explicitly deploy to /Workspace/Users/ishfaqmmalik@outlook.com to make sure we only have a single copy.
      root_path: /Workspace/Shared/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: prod
      dev_flag: false
      
    permissions:
      - service_principal_name: b27b88cd-6019-4269-8f9c-aa9733ef23dc
        level: CAN_MANAGE
    run_as:
       service_principal_name: b27b88cd-6019-4269-8f9c-aa9733ef23dc 