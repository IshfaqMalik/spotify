# This is a Databricks asset bundle definition for spotify.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: spotify
  uuid: 4ce309c3-3ff8-4546-97d3-57fe1b6b4efb

include:
  - resources/*.yml
  - resources/*/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    default: dev


targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://adb-7405612200933438.18.azuredatabricks.net
    variables:
      catalog: dev
      
    presets:
      artifacts_dynamic_version: true
  test:
    mode: production
    workspace:
      host: https://adb-7405607648433478.18.azuredatabricks.net
      # We explicitly deploy to /Workspace/Users/ishfaqmmalik@outlook.com to make sure we only have a single copy.
      root_path: /Workspace/Shared/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: dbw_dev_northeurope
      schema: prod
    permissions:
      - user_name: ishfaqmmalik@outlook.com
        level: CAN_MANAGE
  prod:
    mode: production
    workspace:
      host: https://adb-7405609543179080.0.azuredatabricks.net
      # We explicitly deploy to /Workspace/Users/ishfaqmmalik@outlook.com to make sure we only have a single copy.
      root_path: /Workspace/Shared/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: dbw_dev_northeurope
      schema: prod
    permissions:
      - user_name: ishfaqmmalik@outlook.com
        level: CAN_MANAGE